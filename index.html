<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VHADS Pro - Real-time Video HIGHT Attack Detection System">
    <title>VHADS Pro v2.0 - HIGHT Video Attack Detection | IEEE Demo</title>
    
    <!-- CDN Dependencies -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    
    <!-- Preload Critical Resources -->
    <link rel="preload" href="css/vhads.css" as="style">
    <link rel="preload" href="js/cipher.js" as="script">
    
    <link rel="stylesheet" href="css/vhads.css">
</head>
<body>
    <div class="app" role="main" aria-label="VHADS Pro Dashboard">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="sr-only">VHADS Pro v2.0</h1>
                <div class="logo">
                    <span class="logo-icon">🔐</span>
                    <span class="logo-text">VHADS Pro</span>
                </div>
                <div class="header-meta">
                    <span class="version">v2.0</span>
                    <span class="status" data-status="ready">Ready</span>
                </div>
            </div>
        </header>

        <!-- Controls Panel -->
        <section class="control-panel" aria-labelledby="controls-heading">
            <h2 id="controls-heading" class="sr-only">Analysis Controls</h2>
            
            <div class="upload-zone" role="region" aria-label="Video Upload">
                <input type="file" id="videoInput" accept="video/*" hidden>
                <label for="videoInput" class="upload-trigger">
                    <span class="upload-icon">📹</span>
                    <span class="upload-text">Upload CCTV Video</span>
                    <span class="upload-hint">(MP4, MOV, AVI • Max 100MB)</span>
                </label>
                <div id="videoPreview" class="video-preview" aria-live="polite"></div>
            </div>

            <div class="control-grid">
                <div class="control-group">
                    <label for="attackRate">Attack Probability</label>
                    <div class="slider-container">
                        <input type="range" id="attackRate" min="0" max="1" step="0.01" value="0.25" aria-valuetext="25%">
                        <output for="attackRate" id="attackRateValue">0.25</output>
                    </div>
                </div>
                <div class="control-group">
                    <label for="frameCount">Frame Count</label>
                    <div class="slider-container">
                        <input type="range" id="frameCount" min="16" max="128" step="8" value="64" aria-valuetext="64 frames">
                        <output for="frameCount" id="frameCountValue">64</output>
                    </div>
                </div>
            </div>

            <button id="analyzeBtn" class="analyze-btn" disabled>
                <span class="btn-icon">🚀</span>
                <span class="btn-text">Initialize Analysis</span>
            </button>
        </section>

        <!-- Tabs -->
        <nav class="tab-nav" role="tablist">
            <button role="tab" class="tab-btn active" aria-selected="true" data-tab="analysis" aria-controls="analysis-panel">
                📊 Real-time Analysis
            </button>
            <button role="tab" class="tab-btn" aria-selected="false" data-tab="metrics" aria-controls="metrics-panel">
                📈 ML Performance
            </button>
            <button role="tab" class="tab-btn" data-tab="reports" aria-controls="reports-panel">
                📋 Classification Report
            </button>
        </nav>

        <!-- Tab Panels -->
        <main class="tab-panels">
            <!-- Analysis Panel -->
            <section id="analysis-panel" role="tabpanel" class="tab-panel active" aria-labelledby="analysis-tab">
                <div class="frame-compare">
                    <div class="frame-viewer">
                        <h3>Input Frames (CCTV)</h3>
                        <canvas id="inputFrame" width="400" height="300" aria-label="Input video frame"></canvas>
                        <div class="frame-status">
                            <span>Frame: <output id="inputFrameNum">1</output>/128</span>
                        </div>
                    </div>
                    <div class="frame-viewer">
                        <h3>HIGHT-32 Encrypted</h3>
                        <canvas id="outputFrame" width="400" height="300" aria-label="Encrypted video frame"></canvas>
                        <div class="frame-status">
                            <span>Hamming: <output id="hammingDistance">0</output></span>
                            <span>Prediction: <output id="framePrediction">Normal</output></span>
                        </div>
                    </div>
                </div>

                <div class="metrics-summary">
                    <div class="metric-card primary">
                        <div class="metric-value" id="overallAccuracy">98.4%</div>
                        <div class="metric-label">Classification Accuracy</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="normalFrames">62</div>
                        <div class="metric-label">Normal Frames</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="attackFrames">6</div>
                        <div class="metric-label">Attack Frames</div>
                    </div>
                </div>

                <div id="realtimePlot" class="chart-container" style="height: 450px;"></div>
            </section>

            <!-- Metrics Panel -->
            <section id="metrics-panel" role="tabpanel" class="tab-panel" aria-labelledby="metrics-tab">
                <div class="metrics-grid">
                    <div class="chart-container">
                        <h4>Confusion Matrix</h4>
                        <div id="confusionMatrix" style="height: 350px;"></div>
                    </div>
                    <div class="chart-container">
                        <h4>Training Curves</h4>
                        <div id="trainingCurves" style="height: 350px;"></div>
                    </div>
                    <div class="chart-container">
                        <h4>Performance Metrics</h4>
                        <div id="performanceMetrics" style="height: 350px;"></div>
                    </div>
                </div>
            </section>

            <!-- Reports Panel -->
            <section id="reports-panel" role="tabpanel" class="tab-panel" aria-labelledby="reports-tab">
                <div id="classificationReport"></div>
                <div class="report-actions">
                    <a id="exportCSV" class="btn btn-secondary" download="vhads-report.csv" style="display: none;">
                        📥 Export Full Report
                    </a>
                </div>
            </div>
        </main>
    </div>

    <!-- JavaScript Modules -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
