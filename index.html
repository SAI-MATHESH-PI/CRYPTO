<!DOCTYPE html>
<html>
<head>
    <title>VHADS Pro v2.1 - WORKING</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: Arial; background: #1a1a1a; color: white; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        button { background: #00ff88; color: black; padding: 15px 30px; border: none; font-size: 18px; cursor: pointer; }
        canvas { border: 2px solid #333; margin: 10px; background: black; }
        #output { font-family: monospace; background: #000; color: #0f0; padding: 20px; margin: 20px 0; }
        .frame-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 VHADS Pro v2.1 - HIGHT Attack Detection</h1>
        <button onclick="runAnalysis()">🚀 RUN ANALYSIS (64 Frames)</button>
        <div class="frame-grid">
            <div>
                <h3>📹 CCTV Input</h3>
                <canvas id="inputCanvas" width="400" height="300"></canvas>
                <div>Frame: <span id="frameNum">0</span></div>
            </div>
            <div>
                <h3>🔐 Encrypted</h3>
                <canvas id="outputCanvas" width="400" height="300"></canvas>
                <div>Hamming: <span id="hamming">0</span> | Prediction: <span id="prediction">NORMAL</span></div>
            </div>
        </div>
        <div id="output"></div>
        <div id="chart" style="height:400px;"></div>
    </div>

    <script>
        // ✅ COMPLETE WORKING VERSION - ALL-IN-ONE
        const HIGHT = {
            wk: new Uint8Array([90,77,57,46,35,24,13,2]),
            encrypt(data, attack='normal') {
                let x = new Uint8Array(data.slice(0,8));
                for(let i=0; i<8; i++) x[i] = i%2 ? x[i]^this.wk[i] : (x[i]+this.wk[i])&255;
                
                for(let r=0; r<32; r++) {
                    if(attack=='fault' && r==16) { x[3] ^= 128; continue; }
                    if(attack=='reduced' && r>=24) break;
                    if(attack=='differential' && r==8) { x[0] ^= 17; continue; }
                    
                    let t1 = ((x[6]<<1|x[6]>>>7) ^ (x[6]<<2|x[6]>>>6) ^ (x[6]<<7|x[6]>>>1) + r*4+3) & 255;
                    x[0] = x[7] ^ t1;
                    let t2 = ((x[0]<<3|x[0]>>>5) ^ (x[0]<<5|x[0]>>>3) ^ (x[0]<<6|x[0]>>>2) ^ r*4+2) & 255;
                    x[2] = (x[1] + t2) & 255;
                    x[4] = x[3] ^ ((x[2]<<1|x[2]>>>7) ^ (x[2]<<2|x[2]>>>6) ^ (x[2]<<7|x[2]>>>1) + r*4+1) & 255;
                    x[6] = (x[5] + ((x[4]<<3|x[4]>>>5) ^ (x[4]<<5|x[4]>>>3) ^ (x[4]<<6|x[4]>>>2) ^ r*4)) & 255;
                }
                
                let ct = new Uint8Array(8);
                for(let i=0; i<8; i++) ct[i] = i%2 ? x[(i+1)%8]^this.wk[i] : (x[(i+1)%8]+this.wk[i])&255;
                return ct;
            }
        };

        const CCTV = {
            generateFrame(i) {
                const frame = new Uint8Array(64*64);
                const t = i * 0.033;
                for(let y=0; y<64; y++) for(let x=0; x<64; x++) {
                    let p = 50 + Math.random()*20;
                    if(x<20) p+=40; if(y>45) p+=30;
                    let px = 25 + Math.sin(t*0.8)*12, py = 25 + Math.cos(t*0.6)*8;
                    let d = Math.hypot(x-px, y-py);
                    if(d<8) p = Math.max(200, p + 120 - d*10);
                    if(x>3&&x<12&&y<6) p += Math.sin(t*8+(x+y)*2)*80 + 120;
                    frame[y*64+x] = Math.max(0, Math.min(255, p + (Math.random()**0.5*12-6)));
                }
                return frame;
            },
            render(canvas, data, encrypted=null) {
                let ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = false;
                ctx.fillStyle = '#000'; ctx.fillRect(0,0,400,300);
                for(let by=0; by<8; by++) for(let bx=0; bx<8; bx++) {
                    let x = bx*50, y=by*37.5, avg = 128;
                    if(data) {
                        let i = (by*8+bx*8)*64;
                        avg = (data[i]+data[i+1]+data[i+64]+data[i+65])/4;
                    }
                    ctx.fillStyle = encrypted ? `hsl(${(avg*1.4)%360},80%,${25+avg*0.35}%)` : `rgb(${avg},${avg},${avg})`;
                    ctx.fillRect(x,y,50,37.5);
                    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.strokeRect(x,y,50,37.5);
                }
            }
        };

        const ML = {
            predict(hamming) {
                let scores = {
                    normal: Math.max(0, 1.2 - hamming*0.35),
                    fault: Math.max(0, (hamming-2.5)*0.42),
                    reduced: Math.max(0, (3.5-hamming)*0.48),
                    differential: Math.max(0, (hamming-4.8)*0.52)
                };
                let total = Object.values(scores).reduce((a,b)=>a+b,0)||1;
                let probs = Object.fromEntries(Object.entries(scores).map(([k,v])=>[k,v/total]));
                let pred = Object.entries(probs).reduce((a,b)=>a[1]>b[1]?a:b)[0];
                return { prediction: pred, confidence: Math.max(...Object.values(probs)), hamming };
            }
        };

        let results = [];
        window.runAnalysis = async function() {
            document.getElementById('output').innerHTML = 'Processing...';
            results = [];
            let n = 64;
            
            for(let i=0; i<n; i++) {
                let frame = CCTV.generateFrame(i);
                let attack = Math.random()<0.25 ? (Math.random()<0.5?'fault':'reduced') : 'normal';
                let enc = HIGHT.encrypt(frame, attack);
                let ham = frame.slice(0,8).filter((b,j)=>b!==enc[j]).length;
                let pred = ML.predict(ham);
                
                results.push({frame:i+1, attack, prediction:pred.prediction, hamming:ham, conf:pred.confidence});
                
                CCTV.render(document.getElementById('inputCanvas'), frame);
                CCTV.render(document.getElementById('outputCanvas'), frame, enc);
                
                document.getElementById('frameNum').textContent = i+1;
                document.getElementById('hamming').textContent = ham;
                document.getElementById('prediction').textContent = pred.prediction.toUpperCase();
                document.getElementById('prediction').style.color = pred.prediction=='normal'?'#0f0':pred.prediction=='fault'?'#ff0':'#f00';
                
                await new Promise(r=>setTimeout(r,50));
            }
            
            // FINAL REPORT
            let normal = results.filter(r=>r.prediction=='normal').length;
            let attacks = results.length - normal;
            let accuracy = (results.filter(r=>r.prediction==r.attack).length/results.length*100).toFixed(1);
            
            document.getElementById('output').innerHTML = `
                ✅ ANALYSIS COMPLETE (${results.length} frames)<br>
                Normal: ${normal} | Attacks: ${attacks} | Accuracy: ${accuracy}%<br><br>
                <b>SAMPLE OUTPUT:</b><br>
                ${results.slice(-5).map(r=>`Frame ${r.frame}: Hamming=${r.hamming} → ${r.prediction.toUpperCase()} (${(r.conf*100).toFixed(0)}%)`).join('<br>')}
            `;
            
            Plotly.newPlot('chart', [{
                x: results.map(r=>r.frame),
                y: results.map(r=>r.hamming),
                type: 'scatter',
                mode: 'lines+markers',
                name: 'Hamming Distance'
            }], {title: 'Real-time Analysis'});
        };
    </script>
</body>
</html>
