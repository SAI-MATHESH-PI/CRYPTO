<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VHADS Pro v2.1 - HIGHT Attack Detection System</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root {
            --primary: #1e40af; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #f1f5f9;
            --shadow: 0 20px 40px rgba(0,0,0,0.4); --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--bg), #1e293b);
            color: var(--text); min-height: 100vh; padding: 20px;
        }
        .app { max-width: 1400px; margin: 0 auto; }
        .header { 
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(90deg, var(--primary), #3b82f6);
            padding: 2rem; border-radius: var(--radius); margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }
        .logo-icon { font-size: 2rem; margin-right: 1rem; }
        .logo-text { font-size: 2rem; font-weight: 700; }
        .status { padding: 0.5rem 1.5rem; border-radius: 50px; 
            background: rgba(16,185,129,0.2); font-weight: 600; }
        .status.processing { background: rgba(245,158,11,0.2); }
        .status.error { background: rgba(239,68,68,0.2); }
        
        .control-panel { background: var(--card); padding: 2rem; border-radius: var(--radius); 
            box-shadow: var(--shadow); margin-bottom: 2rem; }
        .upload-zone { border: 3px dashed var(--border); border-radius: 12px; 
            padding: 3rem; text-align: center; margin-bottom: 2rem; cursor: pointer;
            transition: all 0.3s; }
        .upload-zone:hover { border-color: var(--primary); background: rgba(30,64,175,0.1); }
        .upload-zone.dragover { border-color: var(--success); background: rgba(16,185,129,0.1); }
        .upload-trigger { font-size: 1.5rem; cursor: pointer; }
        #videoPreview { margin-top: 1rem; }
        
        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 2rem; margin-bottom: 2rem; }
        .slider-container { display: flex; align-items: center; gap: 1rem; }
        label { font-weight: 600; margin-bottom: 0.5rem; display: block; }
        output { font-family: monospace; font-weight: 700; color: var(--primary); min-width: 3rem; }
        
        .analyze-btn { 
            background: linear-gradient(90deg, var(--success), #059669);
            color: white; border: none; padding: 1rem 3rem; font-size: 1.2rem; 
            border-radius: 12px; cursor: pointer; font-weight: 600;
            transition: all 0.3s; width: 100%; 
        }
        .analyze-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(16,185,129,0.4); }
        .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .tab-nav { display: flex; background: var(--card); border-radius: var(--radius); 
            padding: 0.5rem; margin-bottom: 2rem; box-shadow: var(--shadow); }
        .tab-btn { flex: 1; border: none; padding: 1rem; background: transparent; 
            color: var(--text); cursor: pointer; border-radius: 8px; font-weight: 600;
            transition: all 0.3s; }
        .tab-btn.active, .tab-btn:hover { background: var(--primary); color: white; }
        
        .tab-panel { display: none; background: var(--card); padding: 2rem; 
            border-radius: var(--radius); box-shadow: var(--shadow); }
        .tab-panel.active { display: block; }
        
        .frame-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
        .frame-viewer { text-align: center; }
        .frame-viewer h3 { margin-bottom: 1rem; color: var(--primary); }
        .frame-viewer canvas { 
            border: 3px solid var(--border); border-radius: 12px; 
            background: #0a0a0a; margin-bottom: 1rem; box-shadow: var(--shadow);
        }
        .frame-status { font-family: monospace; font-size: 1.1rem; }
        .prediction { font-weight: 700; padding: 0.25rem 0.75rem; border-radius: 20px; 
            font-size: 1.1rem; }
        .prediction.normal { background: rgba(16,185,129,0.2); color: var(--success); }
        .prediction.fault { background: rgba(245,158,11,0.2); color: var(--warning); }
        .prediction.reduced { background: rgba(59,130,246,0.2); color: var(--primary); }
        .prediction.differential { background: rgba(239,68,68,0.2); color: var(--danger); }
        
        .metrics-summary { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .metric-card { flex: 1; text-align: center; padding: 2rem; 
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            border-radius: var(--radius); color: white; }
        .metric-card.primary { background: linear-gradient(135deg, var(--success), #059669); }
        .metric-card div:first-child { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        
        .chart-container { background: var(--bg); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px,1fr)); gap: 2rem; }
        #classificationReport { white-space: pre-wrap; font-family: monospace; background: var(--bg); 
            padding: 2rem; border-radius: var(--radius); line-height: 1.6; }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🔐</span>
                <span class="logo-text">VHADS Pro v2.1</span>
            </div>
            <div class="status ready" id="status">Ready</div>
        </header>

        <section class="control-panel">
            <div class="upload-zone" id="uploadZone">
                <input type="file" id="videoInput" accept="video/*" hidden>
                <label for="videoInput" class="upload-trigger">📹 Upload CCTV Video (or click for simulation)</label>
                <video id="videoPreview" controls style="max-width:100%; border-radius:8px; display:none;"></video>
            </div>
            
            <div class="control-grid">
                <div>
                    <label>Attack Rate</label>
                    <div class="slider-container">
                        <input type="range" id="attackRate" min="0" max="1" step="0.01" value="0.25">
                        <output id="attackRateValue">25%</output>
                    </div>
                </div>
                <div>
                    <label>Frame Count</label>
                    <div class="slider-container">
                        <input type="range" id="frameCount" min="16" max="128" step="8" value="64">
                        <output id="frameCountValue">64</output>
                    </div>
                </div>
            </div>
            <button id="analyzeBtn" class="analyze-btn">🚀 Run Analysis</button>
        </section>

        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="analysis">📊 Real-time Analysis</button>
            <button class="tab-btn" data-tab="metrics">📈 ML Metrics</button>
            <button class="tab-btn" data-tab="reports">📋 Classification Report</button>
        </nav>

        <div class="tab-panels">
            <section id="analysis-panel" class="tab-panel active">
                <div class="frame-compare">
                    <div class="frame-viewer">
                        <h3>📹 CCTV Input Frame</h3>
                        <canvas id="inputFrame" width="400" height="300"></canvas>
                        <div class="frame-status">Frame: <span id="frameNum">1/64</span></div>
                    </div>
                    <div class="frame-viewer">
                        <h3>🔐 HIGHT Encrypted</h3>
                        <canvas id="outputFrame" width="400" height="300"></canvas>
                        <div class="frame-status">
                            Hamming: <span id="hammingValue">0</span> | 
                            Prediction: <span id="predictionValue" class="prediction normal">NORMAL</span>
                        </div>
                    </div>
                </div>
                <div class="metrics-summary">
                    <div class="metric-card primary">
                        <div id="overallAccuracy">98.4%</div>
                        <div>Overall Accuracy</div>
                    </div>
                    <div class="metric-card" style="background: linear-gradient(135deg, var(--success), #059669);">
                        <div id="normalFrames">46</div><div>Normal Frames</div>
                    </div>
                    <div class="metric-card" style="background: linear-gradient(135deg, var(--warning), #d97706);">
                        <div id="attackFrames">18</div><div>Attack Frames</div>
                    </div>
                </div>
                <div class="chart-container">
                    <h3>🔍 Real-time Hamming Distance & Predictions</h3>
                    <div id="realtimeChart" style="height:400px;"></div>
                </div>
            </section>

            <section id="metrics-panel" class="tab-panel">
                <div class="metrics-grid">
                    <div class="chart-container">
                        <h3>🎯 Confusion Matrix</h3>
                        <div id="confusionMatrix" style="height:350px;"></div>
                    </div>
                    <div class="chart-container">
                        <h3>📊 Performance Metrics</h3>
                        <div id="performanceMetrics" style="height:350px;"></div>
                    </div>
                    <div class="chart-container">
                        <h3>📈 Attack Distribution</h3>
                        <div id="attackDistribution" style="height:350px;"></div>
                    </div>
                </div>
            </section>

            <section id="reports-panel" class="tab-panel">
                <div id="classificationReport"></div>
                <button id="exportBtn" class="analyze-btn" style="display:none; margin-top:1rem; background: linear-gradient(90deg, var(--primary), #3b82f6);">📥 Download CSV Report</button>
            </section>
        </div>
    </div>

    <script src="js/hight-cipher.js"></script>
    <script src="js/video-processor.js"></script>
    <script src="js/vhads-model.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
