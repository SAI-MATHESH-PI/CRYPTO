<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VHADS Pro v2.0 - HIGHT Attack Detection</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="css/vhads.css">
</head>
<body>
    <!-- SAME HTML STRUCTURE FROM PREVIOUS RESPONSE -->
    <div class="app">
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🔐</span>
                    <span class="logo-text">VHADS Pro v2.0</span>
                </div>
                <div class="header-meta">
                    <span class="version">Production</span>
                    <span class="status" data-status="ready">Ready</span>
                </div>
            </div>
        </header>

        <section class="control-panel">
            <div class="upload-zone">
                <input type="file" id="videoInput" accept="video/*" hidden>
                <label for="videoInput" class="upload-trigger">
                    <span class="upload-icon">📹</span>
                    <span class="upload-text">Upload CCTV Video</span>
                    <span class="upload-hint">(MP4 • Max 100MB)</span>
                </label>
                <div id="videoPreview" class="video-preview"></div>
            </div>

            <div class="control-grid">
                <div class="control-group">
                    <label for="attackRate">Attack Rate</label>
                    <div class="slider-container">
                        <input type="range" id="attackRate" min="0" max="1" step="0.01" value="0.25">
                        <output id="attackRateValue">0.25</output>
                    </div>
                </div>
                <div class="control-group">
                    <label for="frameCount">Frame Count</label>
                    <div class="slider-container">
                        <input type="range" id="frameCount" min="16" max="128" step="8" value="64">
                        <output id="frameCountValue">64</output>
                    </div>
                </div>
            </div>
            <button id="analyzeBtn" class="analyze-btn" disabled>🚀 Analyze</button>
        </section>

        <nav class="tab-nav" role="tablist">
            <button class="tab-btn active" data-tab="analysis">📊 Analysis</button>
            <button class="tab-btn" data-tab="metrics">📈 Metrics</button>
            <button class="tab-btn" data-tab="reports">📋 Reports</button>
        </nav>

        <main class="tab-panels">
            <section id="analysis-panel" class="tab-panel active">
                <div class="frame-compare">
                    <div class="frame-viewer">
                        <h3>Input CCTV</h3>
                        <canvas id="inputFrame" width="400" height="300"></canvas>
                        <div class="frame-status">Frame: <output id="frameNum">1</output></div>
                    </div>
                    <div class="frame-viewer">
                        <h3>HIGHT Encrypted</h3>
                        <canvas id="outputFrame" width="400" height="300"></canvas>
                        <div class="frame-status">
                            Hamming: <output id="hammingValue">0</output> | 
                            Pred: <output id="predictionValue">Normal</output>
                        </div>
                    </div>
                </div>
                <div class="metrics-summary">
                    <div class="metric-card primary">
                        <div id="overallAccuracy">98.4%</div>
                        <div>Accuracy</div>
                    </div>
                    <div class="metric-card">
                        <div id="normalFrames">62</div>
                        <div>Normal</div>
                    </div>
                    <div class="metric-card">
                        <div id="attackFrames">2</div>
                        <div>Attacks</div>
                    </div>
                </div>
                <div id="realtimeChart" class="chart-container" style="height:450px;"></div>
            </section>

            <section id="metrics-panel" class="tab-panel">
                <div class="metrics-grid">
                    <div class="chart-container">
                        <h4>Confusion Matrix</h4>
                        <div id="confusionMatrix" style="height:350px;"></div>
                    </div>
                    <div class="chart-container">
                        <h4>Training Curves</h4>
                        <div id="trainingCurves" style="height:350px;"></div>
                    </div>
                    <div class="chart-container">
                        <h4>Performance</h4>
                        <div id="performanceMetrics" style="height:350px;"></div>
                    </div>
                </div>
            </section>

            <section id="reports-panel" class="tab-panel">
                <div id="classificationReport"></div>
                <a id="exportBtn" class="btn btn-secondary" style="display:none">📥 Export CSV</a>
            </section>
        </main>
    </div>

    <!-- LOAD ALL JS FILES SEQUENTIALLY -->
    <script src="js/cipher.js"></script>
    <script src="js/ml-models.js"></script>
    <script src="js/video.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
